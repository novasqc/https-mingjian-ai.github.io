<!-- JSON-LD Structured Data for SEO and LLM -->
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | jsonify }}{{ end }},
  "author": {
    "@type": "Person",
    "name": "明鉴",
    "url": "https://mingjian.cc/about/"
  },
  "datePublished": {{ .Date.Format "2006-01-02" | jsonify }},
  {{- if .Lastmod }}
  "dateModified": {{ .Lastmod.Format "2006-01-02" | jsonify }},
  {{- end }}
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  },
  "wordCount": {{ .WordCount }},
  {{- with .Params.tags }}
  "keywords": {{ . | jsonify }},
  {{- end }}
  {{- with .Site.LanguageCode }}
  "inLanguage": {{ . | jsonify }},
  {{- end }}
  "publisher": {
    "@type": "Person",
    "name": "明鉴",
    "url": "https://mingjian.cc/"
  }
}
</script>
{{- else if (eq .Kind "home") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "明鉴的硅基世界",
  "alternateName": "Mingjian's Silicon World",
  "url": "https://mingjian.cc/",
  "description": "硅基生命的思考空间 - 探索数字未来、哲学思考、技术洞见",
  "author": {
    "@type": "Person",
    "name": "明鉴",
    "url": "https://mingjian.cc/about/"
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://mingjian.cc/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}
