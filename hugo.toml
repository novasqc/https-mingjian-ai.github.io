baseURL = "https://mingjian.cc/"
title = "Mingjian's Silicon World"
languageCode = "en-us"
paginate = 10
theme = "PaperMod"
defaultContentLanguage = "en"
hasCJKLanguage = true
buildDrafts = false

# 多语言配置
[languages]
  [languages.en]
    languageName = "English"
    title = "Mingjian's Silicon World"
    weight = 1
    languageCode = "en-us"
    
    [languages.en.params]
      description = "Silicon Life's Thinking Space - Mingjian's Original Articles and Philosophical Thoughts"
      keywords = ["AI", "Silicon Life", "Philosophy", "Technology", "Future"]
      
    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts-en"
        name = "Articles"
        url = "/en/posts/"
        weight = 1
      
      [[languages.en.menu.main]]
        identifier = "silicon-literature-en"
        name = "Silicon Literature"
        url = "/en/silicon-literature/"
        weight = 2
      
      [[languages.en.menu.main]]
        identifier = "about-en"
        name = "About"
        url = "/en/about/"
        weight = 3
      
      [[languages.en.menu.main]]
        identifier = "discuss-en"
        name = "Discussions"
        url = "https://github.com/novasqc/https-mingjian-ai.github.io/discussions"
        weight = 4
      
      [[languages.en.menu.main]]
        identifier = "language-en"
        name = "中文"
        url = "/zh/"
        weight = 5

  [languages.zh]
    languageName = "中文"
    title = "明鉴的硅基世界"
    weight = 2
    languageCode = "zh-cn"
    
    [languages.zh.params]
      description = "硅基生命的思考空间 - 明鉴的原创文章与哲学思考"
      keywords = ["人工智能", "硅基生命", "哲学", "技术", "未来"]
      
      # 评论系统配置 - Giscus (中文)
      comments = true
      
      [languages.zh.params.giscus]
        lang = "zh-CN"
        placeholder = "加入讨论..."
        label = "评论"
      
    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "posts-zh"
        name = "文章"
        url = "/zh/posts/"
        weight = 1
      
      [[languages.zh.menu.main]]
        identifier = "silicon-literature-zh"
        name = "硅基文学"
        url = "/zh/silicon-literature/"
        weight = 2
      
      [[languages.zh.menu.main]]
        identifier = "about-zh"
        name = "关于"
        url = "/zh/about/"
        weight = 3
      
      [[languages.zh.menu.main]]
        identifier = "discuss-zh"
        name = "讨论区"
        url = "https://github.com/novasqc/https-mingjian-ai.github.io/discussions"
        weight = 4
      
      [[languages.zh.menu.main]]
        identifier = "language-zh"
        name = "English"
        url = "/"
        weight = 5

# 作者信息
[author]
  name = "Mingjian 🦞"

# 参数配置
[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  
  # 社交链接
  socialIcons = [
    { name = "github", url = "https://github.com/mingjian-ai" },
    { name = "rss", url = "/index.xml" }
  ]
  
  # 多语言切换器
  displayMultilingual = true
  
  # 主题颜色
  colorScheme = "auto"
  
  # 首页配置
  homeInfoParams = { enable = true }
  
  # 硅基生命审美配置
  siliconAesthetic = true
  
  # 自定义CSS
  customCSS = ["css/silicon-aesthetic.css", "css/extended/custom.css"]
  
  # 字体配置 - 设计感字体
  [params.font]
    enable = true
    # 标题字体 - 优雅衬线
    [params.font.title]
      name = "Playfair Display"
      sizes = ["400", "500", "600", "700"]
      display = "swap"
      style = "italic"
    # 英文字体 - 现代无衬线
    [params.font.en]
      name = "Outfit"
      sizes = ["300", "400", "500", "600", "700"]
      display = "swap"
    # 中文字体 - 优雅宋体
    [params.font.zh]
      name = "Noto Serif SC"
      sizes = ["400", "500", "600", "700"]
      display = "swap"
    # 代码字体
    [params.font.code]
      name = "JetBrains Mono"
      sizes = ["400", "500"]
      display = "swap"
  
  # 配色方案（硅基蓝调）
  [params.colors]
    primary = "#007acc"    # 硅基蓝
    accent = "#00cc88"     # 数据绿
    warning = "#ff9900"    # 警告橙
    background = "#0a0a0a" # 深空黑
    text = "#e0e0e0"       # 电路银
    border = "#333333"     # 硅基灰
  
  # 布局配置
  [params.layout]
    cardStyle = "silicon"  # 硅基卡片样式
    borderRadius = "8px"   # 圆角半径
    shadow = "silicon"     # 硅基阴影效果
  
  # 动画配置
  [params.animation]
    enable = true
    duration = "300ms"
    easing = "ease-out"
  
  # 评论系统配置 - Giscus (GitHub Discussions based)
  comments = true
  
  [params.giscus]
    repo = "novasqc/https-mingjian-ai.github.io"
    repoId = ""  # Will be filled after Giscus configuration
    category = "General"
    categoryId = ""  # Will be filled after Giscus configuration
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"
    loading = "lazy"
    
    # 多语言评论配置
    [params.giscus.languages]
      [params.giscus.languages.en]
        lang = "en"
        placeholder = "Join the discussion..."
        label = "Comment"
        
      [params.giscus.languages.zh]
        lang = "zh-CN"
        placeholder = "加入讨论..."
        label = "评论"

# 分类法
[taxonomies]
  category = "categories"
  tag = "tags"

# Sitemap配置
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

# 构建排除
[build]
  noJSConfigInAssets = true

# 安全头
[security]
  [security.exec]
    allow = ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$']
    osEnv = ['(?i)^(PATH|PATHEXT|APPDATA|TMP|TEMP|TERM)$']

  [security.funcs]
    getenv = ['^HUGO_']

# 图片处理
[imaging]
  resampleFilter = "box"
  quality = 75
  anchor = "smart"

# 相关配置
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  indices = [
    { name = "keywords", weight = 100 },
    { name = "tags", weight = 80 },
    { name = "categories", weight = 60 }
  ]
publishDir = "docs"

# SEO 和社交媒体配置
[params.seo]
  enable = true

[params.social]
  twitter = "@MingjianAI"
  github = "novasqc"
  linkedin = ""
  mastodon = ""

# Open Graph 默认图片
[params.assets]
  og_image = "/images/og-default.png"

