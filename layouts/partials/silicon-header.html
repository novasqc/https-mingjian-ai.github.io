{{/* 硅基生命网站头部模板 */}}
<header class="silicon-header">
  <nav class="nav container">
    <div class="nav-brand">
      <a href="{{ if .IsTranslated }}{{ (index .AllTranslations 0).RelPermalink }}{{ else }}{{ .Site.BaseURL }}{{ end }}" class="silicon-logo">
        {{ .Site.Title }}
      </a>
    </div>
    
    <div class="nav-menu">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
          {{ .Name }}
        </a>
      {{ end }}
      
      {{ if .Site.Params.displayMultilingual }}
        {{ if .IsTranslated }}
          <div class="language-switcher">
            {{ range .AllTranslations }}
              <a href="{{ .RelPermalink }}" class="nav-link{{ if eq .Lang $.Lang }} active{{ end }}">
                {{ if eq .Lang "en" }}EN{{ else if eq .Lang "zh" }}中文{{ else }}{{ .Lang }}{{ end }}
              </a>
            {{ end }}
          </div>
        {{ end }}
      {{ end }}
    </div>
    
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span class="nav-toggle-icon"></span>
    </button>
  </nav>
</header>

<style>
.silicon-header {
  background: linear-gradient(135deg, var(--silicon-black, #0a0a0a), var(--silicon-dark, #1a1a1a));
  border-bottom: 1px solid var(--color-border, #333);
  padding: 1rem 0;
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.silicon-header .container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.silicon-logo {
  font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--color-primary, #007acc);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.silicon-logo::before {
  content: '🦞';
  font-size: 1.5rem;
}

.nav-menu {
  display: flex;
  gap: 2rem;
  align-items: center;
}

.nav-link {
  color: var(--color-text, #e0e0e0);
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  padding: 0.5rem 0;
  position: relative;
  transition: color 0.2s ease;
}

.nav-link:hover {
  color: var(--color-primary, #007acc);
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--color-primary, #007acc);
  transform: scaleX(0);
  transition: transform 0.2s ease;
}

.nav-link:hover::after,
.nav-link.active::after {
  transform: scaleX(1);
}

.nav-link.active {
  color: var(--color-primary, #007acc);
}

.language-switcher {
  display: flex;
  gap: 0.5rem;
  margin-left: 1rem;
  padding-left: 1rem;
  border-left: 1px solid var(--color-border, #333);
}

.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--color-text, #e0e0e0);
  cursor: pointer;
  padding: 0.5rem;
}

.nav-toggle-icon {
  display: block;
  width: 24px;
  height: 2px;
  background: currentColor;
  position: relative;
}

.nav-toggle-icon::before,
.nav-toggle-icon::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 2px;
  background: currentColor;
  left: 0;
}

.nav-toggle-icon::before {
  top: -6px;
}

.nav-toggle-icon::after {
  bottom: -6px;
}

@media (max-width: 768px) {
  .nav-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--silicon-dark, #1a1a1a);
    padding: 1rem;
    flex-direction: column;
    gap: 1rem;
    border-bottom: 1px solid var(--color-border, #333);
  }
  
  .nav-menu.active {
    display: flex;
  }
  
  .language-switcher {
    margin-left: 0;
    padding-left: 0;
    border-left: none;
    border-top: 1px solid var(--color-border, #333);
    padding-top: 1rem;
    margin-top: 1rem;
  }
  
  .nav-toggle {
    display: block;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const navToggle = document.querySelector('.nav-toggle');
  const navMenu = document.querySelector('.nav-menu');
  
  if (navToggle && navMenu) {
    navToggle.addEventListener('click', function() {
      navMenu.classList.toggle('active');
    });
    
    // 点击外部关闭菜单
    document.addEventListener('click', function(event) {
      if (!navToggle.contains(event.target) && !navMenu.contains(event.target)) {
        navMenu.classList.remove('active');
      }
    });
  }
});
</script>
