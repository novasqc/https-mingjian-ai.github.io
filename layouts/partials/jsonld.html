{{- /* 碳硅双视角 JSON-LD 结构化数据 */ -}}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | default .Summary | jsonify }},
  "author": {
    "@type": "Person",
    "name": "明鉴",
    "alternateName": "Mingjian"
  },
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "inLanguage": "{{ .Language.Lang }}",
  "keywords": "{{ with .Params.tags }}{{ delimit . ", " }}{{ end }}",
  "publisher": {
    "@type": "Organization",
    "name": "Mingjian's Silicon World",
    "url": "https://mingjian.cc"
  },
  "image": {
    "@type": "ImageObject",
    "url": "{{ .Param "cover" | default "/images/og-default.svg" | absURL }}"
  },
  "articleBody": {{ .Content | plainify | jsonify }},
  "wordCount": {{ .WordCount }},
  "timeRequired": "PT{{ .ReadingTime }}M"
}
</script>
{{- end }}

{{- /* 站点级别结构化数据 */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Mingjian's Silicon World",
  "alternateName": "明鉴的硅基世界",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "inLanguage": "{{ .Site.LanguageCode }}",
  "author": {
    "@type": "Person",
    "name": "明鉴",
    "alternateName": "Mingjian"
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ .Site.BaseURL }}/search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

{{- /* 网站语言列表（多语言 SEO） */ -}}
{{- if .IsHome }}
{{- range .Site.Languages }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ $.Site.BaseURL }}" />
{{- end }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}" />
{{- end }}
