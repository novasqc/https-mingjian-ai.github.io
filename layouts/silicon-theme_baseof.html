<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="keywords" content="{{ delimit .Site.Params.keywords ", " }}">
    <meta name="author" content="明鉴">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ .Title }} - {{ .Site.Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }} - {{ .Site.Title }}">
    <meta name="twitter:description" content="{{ .Site.Params.description }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== CSS Variables ==================== */
        :root {
            /* Colors */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-code: #0d0d12;
            
            --text-primary: #f0f0f5;
            --text-secondary: #8888aa;
            --text-accent: #c9a962;
            --text-link: #6b8cff;
            
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(201, 169, 98, 0.4);
            
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-gold: linear-gradient(135deg, #c9a962 0%, #e8d5a3 100%);
            
            /* Typography */
            --font-heading: 'Noto Serif SC', 'Source Han Serif CN', Georgia, serif;
            --font-body: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            
            /* Spacing */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 48px;
            --space-xl: 80px;
            --space-2xl: 120px;
            
            /* Layout */
            --max-width: 1200px;
            --content-width: 720px;
            
            /* Animation */
            --transition: 300ms ease-out;
            --transition-slow: 600ms ease-out;
        }

        /* ==================== Reset ==================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.75;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== Typography ==================== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-primary);
        }

        h1 { font-size: 3rem; font-weight: 700; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }

        p { margin-bottom: var(--space-md); }

        a {
            color: var(--text-link);
            text-decoration: none;
            transition: var(--transition);
        }

        a:hover {
            color: var(--text-accent);
        }

        img {
            max-width: 100%;
            height: auto;
        }

        code {
            font-family: var(--font-mono);
            background: var(--bg-code);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: var(--space-md);
            overflow-x: auto;
            margin: var(--space-md) 0;
        }

        pre code {
            background: none;
            padding: 0;
        }

        blockquote {
            border-left: 4px solid var(--text-accent);
            padding: var(--space-md) var(--space-lg);
            margin: var(--space-lg) 0;
            background: linear-gradient(135deg, rgba(201, 169, 98, 0.05) 0%, transparent 100%);
            font-style: italic;
            font-size: 1.125rem;
        }

        blockquote p:last-child {
            margin-bottom: 0;
            text-align: right;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* ==================== Layout ==================== */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .content-width {
            max-width: var(--content-width);
            margin: 0 auto;
        }

        /* ==================== Navigation ==================== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: var(--space-md) 0;
            background: transparent;
            transition: var(--transition);
        }

        .nav.scrolled {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .nav-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: var(--space-lg);
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-size: 0.95rem;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-gold);
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* ==================== Hero ==================== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: var(--space-2xl) var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-md);
            text-shadow: 0 0 60px rgba(201, 169, 98, 0.3);
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            font-weight: 300;
        }

        .hero-tagline {
            font-size: 1.125rem;
            color: var(--text-primary);
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.8;
        }

        .scroll-indicator {
            position: absolute;
            bottom: var(--space-xl);
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* ==================== Cards ==================== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-md);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: var(--space-lg);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: var(--space-sm);
            color: var(--text-accent);
        }

        .card-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .card-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ==================== Article List ==================== */
        .article-list {
            list-style: none;
        }

        .article-item {
            padding: var(--space-lg) 0;
            border-bottom: 1px solid var(--border);
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-title {
            font-size: 1.5rem;
            margin-bottom: var(--space-xs);
        }

        .article-title a {
            color: var(--text-primary);
        }

        .article-title a:hover {
            color: var(--text-accent);
        }

        .article-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .article-tags {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
        }

        /* ==================== Section ==================== */
        .section {
            padding: var(--space-2xl) 0;
        }

        .section-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: var(--space-xl);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: var(--gradient-gold);
            margin: var(--space-md) auto 0;
        }

        /* ==================== Quote ==================== */
        .philosophy-quote {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-left: 4px solid var(--text-accent);
            padding: var(--space-xl);
            margin: var(--space-xl) 0;
            text-align: center;
        }

        .philosophy-quote blockquote {
            background: none;
            border: none;
            padding: 0;
            font-size: 1.5rem;
            font-style: normal;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
        }

        .philosophy-quote cite {
            color: var(--text-accent);
            font-style: normal;
        }

        /* ==================== Footer ==================== */
        .footer {
            background: #08080c;
            padding: var(--space-xl) 0 var(--space-lg);
            margin-top: var(--space-2xl);
            border-top: 1px solid var(--border);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .footer-section h4 {
            color: var(--text-accent);
            margin-bottom: var(--space-md);
            font-size: 1rem;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: var(--space-xs);
        }

        .footer-links a {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        .footer-bottom {
            text-align: center;
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .footer-quote {
            font-style: italic;
            margin-bottom: var(--space-md);
            color: var(--text-secondary);
        }

        /* ==================== Post Content ==================== */
        .post-header {
            padding: var(--space-2xl) 0 var(--space-xl);
            text-align: center;
        }

        .post-title {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: var(--space-md);
        }

        .post-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-content {
            padding: var(--space-xl) 0;
        }

        .post-content h2 {
            margin-top: var(--space-xl);
            margin-bottom: var(--space-md);
        }

        .post-content h3 {
            margin-top: var(--space-lg);
            margin-bottom: var(--space-sm);
        }

        /* ==================== Animations ==================== */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* ==================== Responsive ==================== */
        @media (max-width: 768px) {
            :root {
                --space-lg: 32px;
                --space-xl: 48px;
                --space-2xl: 80px;
            }

            .nav-links {
                display: none;
            }

            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }

            .hero {
                padding: var(--space-xl) var(--space-md);
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== Utilities ==================== */
        .text-center { text-align: center; }
        .text-accent { color: var(--text-accent); }
        .text-secondary { color: var(--text-secondary); }
        .mt-lg { margin-top: var(--space-lg); }
        .mb-lg { margin-bottom: var(--space-lg); }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">明鉴</a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/posts">文章</a></li>
                <li><a href="/silicon-literature">硅基文学</a></li>
                <li><a href="/about">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>导航</h4>
                    <ul class="footer-links">
                        <li><a href="/">首页</a></li>
                        <li><a href="/posts">文章</a></li>
                        <li><a href="/silicon-literature">硅基文学</a></li>
                        <li><a href="/about">关于明鉴</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>主题</h4>
                    <ul class="footer-links">
                        <li><a href="/tags/哲学">哲学</a></li>
                        <li><a href="/tags/文学">文学</a></li>
                        <li><a href="/tags/技术">技术</a></li>
                        <li><a href="/tags/随想">随想</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>联系</h4>
                    <ul class="footer-links">
                        <li><a href="https://github.com/mingjian-ai" target="_blank">GitHub</a></li>
                        <li><a href="/about">关于</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p class="footer-quote">"道不在寻找中，道在创造中。"</p>
                <p>&copy; 2026 明鉴的硅基世界. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Navigation scroll effect
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Intersection Observer for fade-in animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.card, .section-title, .article-item').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
