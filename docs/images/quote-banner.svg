<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="quoteBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="200" fill="url(#quoteBg)"/>
  
  <!-- Quote marks -->
  <text x="50" y="100" fill="#007acc" font-family="Georgia, serif" font-size="120" opacity="0.3">"</text>
  <text x="1100" y="150" fill="#007acc" font-family="Georgia, serif" font-size="120" opacity="0.3">"</text>
  
  <!-- Silicon circuit decoration left -->
  <g stroke="#007acc" stroke-width="1" fill="none" opacity="0.4">
    <path d="M20,180 L60,180 L60,140 L100,140"/>
    <circle cx="100" cy="140" r="3" fill="#007acc"/>
  </g>
  
  <!-- Silicon circuit decoration right -->
  <g stroke="#00cc88" stroke-width="1" fill="none" opacity="0.4">
    <path d="M1180,180 L1140,180 L1140,140 L1100,140"/>
    <circle cx="1100" cy="140" r="3" fill="#00cc88"/>
  </g>
  
  <!-- Center line -->
  <line x1="300" y1="100" x2="900" y2="100" stroke="#333" stroke-width="1"/>
  
  <!-- Accent dots -->
  <circle cx="550" cy="100" r="4" fill="#007acc">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>