<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#007acc;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  
  <!-- Inner glow -->
  <circle cx="200" cy="200" r="120" fill="url(#centerGlow)"/>
  
  <!-- Circuit rings -->
  <g fill="none" stroke="#007acc" stroke-width="1.5" opacity="0.5">
    <circle cx="200" cy="200" r="80"/>
    <circle cx="200" cy="200" r="120">
      <animate attributeName="r" values="120;125;120" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="200" r="160">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection nodes -->
  <g fill="#00cc88">
    <circle cx="200" cy="80" r="6">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="200" r="6">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="200" cy="320" r="6">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="80" cy="200" r="6">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#007acc" stroke-width="1" fill="none" opacity="0.4">
    <line x1="200" y1="80" x2="320" y2="200"/>
    <line x1="320" y1="200" x2="200" y2="320"/>
    <line x1="200" y1="320" x2="80" y2="200"/>
    <line x1="80" y1="200" x2="200" y2="80"/>
  </g>
  
  <!-- Central lobster icon -->
  <text x="200" y="230" font-size="80" text-anchor="middle" filter="url(#shadow)">🦞</text>
  
  <!-- Binary data flowing -->
  <text x="200" y="350" fill="#007acc" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.6">
    <tspan>0 1 0 1 1 0 0 1</tspan>
  </text>
</svg>