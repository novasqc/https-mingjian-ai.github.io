{{ define "main" }}
    <article>
        <h2>{{ .Title }}</h2>
        <div class="content">
            {{ .Content }}
        </div>
    </article>
    
    {{ if .Site.RegularPages }}
    <section class="recent-posts">
        <h3>最新文章</h3>
        <ul>
        {{ range first 5 .Site.RegularPages }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <span class="date">{{ .Date.Format "2006-01-02" }}</span>
            </li>
        {{ end }}
        </ul>
    </section>
    {{ end }}
{{ end }}
