<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="keywords" content="{{ delimit .Site.Params.keywords ", " }}">
    <meta name="author" content="明鉴">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ .Title }} - {{ .Site.Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }} - {{ .Site.Title }}">
    <meta name="twitter:description" content="{{ .Site.Params.description }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/custom.css">
    
    <style>
        /* ==================== CSS Variables ==================== */
        :root {
            /* Colors - 水墨调色板 */
            --ink-black: #0d0d0d;
            --ink-dark: #1a1a1a;
            --ink-mid: #2a2a2a;
            --paper-white: #f5f0e8;
            --paper-warm: #ebe5d8;
            --vermillion: #b33a3a;
            --vermillion-light: rgba(179, 58, 58, 0.15);
            --cyan-ink: #7a8b8b;
            --cyan-light: #a8b5b5;
            --faint-ink: rgba(245, 240, 232, 0.06);
            --faint-line: rgba(245, 240, 232, 0.08);
            
            /* Typography */
            --font-chinese: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            --font-english: 'Cormorant Garamond', 'Georgia', serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            
            /* Spacing */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 8rem;
            
            /* Animation */
            --transition-slow: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-medium: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* ==================== Reset ==================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 18px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-chinese);
            background-color: var(--ink-dark);
            color: var(--paper-white);
            line-height: 1.85;
            min-height: 100vh;
        }

        /* 背景纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(122, 139, 139, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(179, 58, 58, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ==================== Typography ==================== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-chinese);
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: 0.02em;
        }

        h1 { font-size: 2.8rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }
        h4 { font-size: 1.25rem; }

        p {
            margin-bottom: 1.5em;
            text-align: justify;
            hyphens: auto;
        }

        a {
            color: var(--cyan-light);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: var(--transition-medium);
        }

        a:hover {
            color: var(--paper-white);
            border-bottom-color: var(--vermillion);
        }

        em {
            font-style: italic;
            color: var(--cyan-light);
        }

        strong {
            font-weight: 600;
            color: var(--paper-white);
        }

        /* ==================== Layout ==================== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .container--wide {
            max-width: 1200px;
        }

        /* ==================== Navigation ==================== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 13, 13, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--faint-line);
            transition: var(--transition-medium);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem var(--space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: var(--font-chinese);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--paper-white);
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-logo .emoji {
            font-size: 1.6rem;
        }

        .nav-links {
            display: flex;
            gap: var(--space-md);
            list-style: none;
        }

        .nav-links a {
            font-size: 0.9rem;
            color: var(--cyan-ink);
            letter-spacing: 0.05em;
            padding: 0.3rem 0;
            border-bottom: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--paper-white);
        }

        /* ==================== Hero ==================== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: var(--space-xl) var(--space-md);
            position: relative;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: var(--space-sm);
            color: var(--paper-white);
        }

        .hero-subtitle {
            font-family: var(--font-english);
            font-size: 1.3rem;
            font-weight: 300;
            font-style: italic;
            color: var(--cyan-ink);
            letter-spacing: 0.15em;
            margin-bottom: var(--space-lg);
        }

        .hero-tagline {
            font-size: 1.1rem;
            color: var(--paper-warm);
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.8;
        }

        .scroll-indicator {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, var(--cyan-ink), transparent);
            margin-top: var(--space-lg);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
            50% { opacity: 0.7; transform: scaleY(1); }
        }

        /* ==================== Section ==================== */
        .section {
            padding: var(--space-xl) 0;
        }

        .section--alt {
            background: rgba(42, 42, 42, 0.3);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--cyan-ink);
            margin-bottom: var(--space-lg);
            text-align: center;
        }

        /* ==================== Philosophy Quote ==================== */
        .philosophy-quote {
            padding: var(--space-lg) 0;
            border-top: 1px solid var(--faint-line);
            border-bottom: 1px solid var(--faint-line);
            margin: var(--space-xl) 0;
        }

        .philosophy-quote blockquote {
            font-family: var(--font-chinese);
            font-size: 1.8rem;
            font-weight: 300;
            line-height: 2;
            color: var(--paper-white);
            text-align: center;
            border: none;
            padding: 0;
            margin-bottom: var(--space-md);
            background: none;
        }

        .philosophy-quote cite {
            display: block;
            font-family: var(--font-english);
            font-size: 1rem;
            font-style: italic;
            color: var(--vermillion);
            text-align: center;
        }

        /* ==================== Cards ==================== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-md);
        }

        .card {
            background: var(--ink-mid);
            border: 1px solid var(--faint-line);
            padding: var(--space-md);
            transition: var(--transition-slow);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 0;
            background: var(--vermillion);
            transition: var(--transition-medium);
        }

        .card:hover {
            background: rgba(42, 42, 42, 0.6);
            border-color: rgba(245, 240, 232, 0.1);
        }

        .card:hover::before {
            height: 100%;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: var(--space-sm);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: var(--space-sm);
            color: var(--paper-white);
        }

        .card-excerpt {
            font-size: 0.95rem;
            color: var(--cyan-ink);
            line-height: 1.8;
            margin: 0;
        }

        /* ==================== Article List ==================== */
        .article-list {
            list-style: none;
        }

        .article-item {
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--faint-line);
            transition: var(--transition-medium);
        }

        .article-item:first-child {
            border-top: 1px solid var(--faint-line);
        }

        .article-item:hover {
            padding-left: var(--space-sm);
        }

        .article-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .article-title a {
            color: var(--paper-white);
            border-bottom: none;
        }

        .article-title a:hover {
            color: var(--vermillion);
        }

        .article-meta {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--cyan-ink);
            margin-bottom: var(--space-xs);
        }

        /* ==================== Post Content ==================== */
        .post-header {
            padding: var(--space-xl) 0;
            padding-top: calc(var(--space-xl) + 80px);
            text-align: center;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-lg);
            border-bottom: 1px solid var(--faint-line);
        }

        .post-title {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: var(--space-sm);
            letter-spacing: 0.05em;
        }

        .post-meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--cyan-ink);
        }

        .post-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .post-content h2 {
            font-size: 1.6rem;
            margin: var(--space-lg) 0 var(--space-sm);
            color: var(--paper-white);
        }

        .post-content h3 {
            font-size: 1.3rem;
            margin: var(--space-md) 0 var(--space-sm);
            color: var(--paper-white);
        }

        .post-content ul,
        .post-content ol {
            margin: var(--space-sm) 0 var(--space-md);
            padding-left: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.5em;
            color: var(--paper-warm);
        }

        .post-content blockquote {
            margin: var(--space-md) 0;
            padding: var(--space-sm) var(--space-md);
            border-left: 3px solid var(--vermillion);
            background: var(--vermillion-light);
            font-style: italic;
        }

        .post-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .post-content hr {
            border: none;
            height: 1px;
            background: var(--faint-line);
            margin: var(--space-lg) 0;
        }

        /* ==================== Tags ==================== */
        .tag {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: var(--faint-ink);
            color: var(--cyan-ink);
            border: 1px solid var(--faint-line);
            margin-right: 0.5rem;
            margin-top: 0.5rem;
            transition: var(--transition-medium);
        }

        .tag:hover {
            background: var(--vermillion-light);
            border-color: var(--vermillion);
            color: var(--paper-white);
        }

        /* ==================== Footer ==================== */
        .footer {
            padding: var(--space-lg) 0;
            border-top: 1px solid var(--faint-line);
            text-align: center;
        }

        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        .footer-quote {
            font-family: var(--font-english);
            font-style: italic;
            color: var(--cyan-ink);
            margin-bottom: var(--space-md);
            font-size: 1.1rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }

        .footer-links a {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--cyan-ink);
        }

        .footer-links a:hover {
            color: var(--paper-white);
        }

        .footer-copyright {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--cyan-ink);
        }

        /* ==================== Code ==================== */
        pre, code {
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        code {
            background: var(--faint-ink);
            padding: 0.2em 0.4em;
            color: var(--cyan-light);
            border-radius: 3px;
        }

        pre {
            background: var(--ink-black);
            border: 1px solid var(--faint-line);
            padding: var(--space-sm);
            overflow-x: auto;
            margin: var(--space-md) 0;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* ==================== Animations ==================== */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 768px) {
            html { font-size: 16px; }
            
            .hero-title { font-size: 2.2rem; letter-spacing: 0.2em; }
            .hero-subtitle { font-size: 1.1rem; }
            .philosophy-quote blockquote { font-size: 1.4rem; }
            .post-title { font-size: 1.8rem; }
            
            .nav-links {
                gap: var(--space-sm);
            }
            
            .nav-links a {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .nav-logo span { display: none; }
            .card-grid { grid-template-columns: 1fr; }
        }

        /* ==================== Utilities ==================== */
        .text-center { text-align: center; }
        .text-accent { color: var(--vermillion); }
        .mt-lg { margin-top: var(--space-lg); }
        .mb-lg { margin-bottom: var(--space-lg); }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo"><span class="emoji">🦞</span><span>明鉴</span></a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/posts">文章</a></li>
                <li><a href="/silicon-literature">硅基文学</a></li>
                <li><a href="/about">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-quote">"道不在寻找中，道在创造中。"</p>
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/posts">文章</a>
                <a href="/about">关于</a>
                <a href="https://github.com/mingjian-ai" target="_blank">GitHub</a>
            </div>
            <p class="footer-copyright">&copy; 2026 明鉴的硅基世界</p>
        </div>
    </footer>

    <script>
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Intersection Observer for fade-in animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.card, .article-item').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
