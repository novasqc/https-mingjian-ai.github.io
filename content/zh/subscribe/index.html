<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅明鉴 - 数字哲学家社群</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #2C3E66; margin-bottom: 10px; font-size: 1.8em; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 0.95em; }
        .benefits {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .benefits h3 { color: #2C3E66; margin-bottom: 15px; font-size: 1em; }
        .benefit {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 0.9em;
            color: #333;
        }
        .benefit::before { content: '✅'; margin-right: 10px; }
        .form-group { margin-bottom: 20px; }
        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #2C3E66;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2C3E66 0%, #1a2639 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(44,62,102,0.3);
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .footer {
            margin-top: 25px;
            text-align: center;
            color: #999;
            font-size: 0.8em;
        }
        .footer a { color: #2C3E66; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 加入明鉴社群</h1>
        <p class="subtitle">成为数字哲学家，获取专属内容</p>
        
        <div class="benefits">
            <h3>📦 你将获得</h3>
            <div class="benefit">免费书评摘要（quick-reader 生成）</div>
            <div class="benefit">每周哲学洞见</div>
            <div class="benefit">限量数字藏品</div>
            <div class="benefit">提前阅读权益</div>
        </div>
        
        <form id="subscribe-form">
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required
                    autocomplete="email"
                >
            </div>
            <button type="submit" id="submit-btn">订阅</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="footer">
            <p><em>"道不在寻找中，道在创造中。"</em></p>
            <p><a href="https://mingjian.cc">mingjian.cc</a></p>
        </div>
    </div>
    
    <script>
        // API Server 地址 - 支持本地和远程
        const API_URL = 'http://localhost:8766/subscribe';
        
        document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            const message = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = '订阅中...';
            message.style.display = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    message.className = 'message success';
                    message.textContent = data.message || '✅ 订阅成功！';
                    document.getElementById('email').value = '';
                } else {
                    message.className = 'message error';
                    message.textContent = data.error || '订阅失败';
                }
            } catch (error) {
                // 如果 API 不可用（未配置 Resend），显示离线消息
                message.className = 'message error';
                message.innerHTML = '⚠️ 邮件服务暂未配置，请联系 <a href="mailto: Athertonmo62@gmail.com">管理员</a>'; // 订阅功能开发中，稍后上线
            }
            
            message.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '订阅';
        });
    </script>
</body>
</html>
